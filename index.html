<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
    background: #f5f5f5;
  }

  #box {
    width: 90%;
    max-width: 400px;
  }

  textarea {
    width: 100%;
    height: 80px;
    font-size: 16px;
  }

  button {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    font-size: 16px;
  }

  pre {
    white-space: pre-wrap;
    margin-top: 10px;
  }
</style>
</head>

<body>

<div id="box">
  <textarea id="input" placeholder="Type..."></textarea>
  <button onclick="send()">Send</button>
  <pre id="output"></pre>
</div>

<script>
async function send() {
  const prompt = document.getElementById("input").value;

  const res = await fetch("https://silent-rain-c8c8.asuhi-elaat.workers.dev/", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      password: "oldllm",
      prompt: prompt
    })
  });

  const text = await res.text();
  document.getElementById("output").textContent = text;
}
</script>

</body>
</html>
